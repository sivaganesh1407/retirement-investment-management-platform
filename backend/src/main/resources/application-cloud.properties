# ============================================
# Cloud / Production profile
# Activate with: spring.profiles.active=cloud
# Set PORT, JWT_SECRET, and (for managed DB) SPRING_DATASOURCE_* in the environment
# ============================================

# Server port from cloud (e.g. Heroku, Cloud Run, App Service set PORT)
server.port=${PORT:8081}

# Database: set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
# Example: jdbc:postgresql://host:5432/dbname (driver auto-detected). Unset = H2 in-memory.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:financial_platform}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA: use update in production so data persists
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL:update}
spring.jpa.show-sql=false

# Disable H2 console in cloud
spring.h2.console.enabled=false

# JWT from environment (required)
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Actuator (same as default: health and info only)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Quieter logging in production
logging.level.root=INFO
logging.level.com.financial.platform=INFO
logging.level.org.hibernate.SQL=WARN
