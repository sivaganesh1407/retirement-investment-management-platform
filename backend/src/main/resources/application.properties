# ============================================
# Retirement Investment Management Platform
# Database & JPA Configuration
# ============================================

# H2 Database for development
spring.datasource.url=jdbc:h2:mem:financial_platform
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate - auto-create tables from entities
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL logging for debugging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# H2 Console (enabled for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration - secret MUST be set via JWT_SECRET env var (never commit a real secret)
# Use at least 32 bytes (256 bits) for HS256, e.g. openssl rand -hex 32
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-ms=86400000

# Server
server.port=8080
